<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;family=IBM+Plex+Mono:wght@400;500&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="#0d1117"/>

  <!-- Left red accent bar — Swiss hallmark -->
  <rect x="48" y="48" width="4" height="184" fill="#E63946"/>

  <!-- Name -->
  <text x="72" y="120" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="72" font-weight="900" letter-spacing="-2" fill="#ffffff">
    MAHAMMADEV
  </text>

  <!-- Thin rule under name -->
  <line x1="72" y1="134" x2="852" y2="134" stroke="#333333" stroke-width="1"/>

  <!-- Role line -->
  <text x="72" y="162" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="13" font-weight="400" letter-spacing="4" fill="#888888">
    DEVELOPER  ·  DESIGNER  ·  TINKERER
  </text>

  <!-- Grid columns — bottom section -->
  <!-- Col 1 label -->
  <text x="72" y="208" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="9" font-weight="700" letter-spacing="3" fill="#E63946">STATUS</text>
  <text x="72" y="226" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="13" font-weight="400" fill="#cccccc">Building · Still learning</text>

  <!-- Vertical divider -->
  <line x1="310" y1="192" x2="310" y2="240" stroke="#333333" stroke-width="1"/>

  <!-- Col 2 label -->
  <text x="330" y="208" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="9" font-weight="700" letter-spacing="3" fill="#E63946">STACK</text>
  <text x="330" y="226" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="13" font-weight="400" fill="#cccccc">C# · Next.js · Bun · Chakra</text>

  <!-- Vertical divider -->
  <line x1="590" y1="192" x2="590" y2="240" stroke="#333333" stroke-width="1"/>

  <!-- Col 3 label -->
  <text x="610" y="208" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="9" font-weight="700" letter-spacing="3" fill="#E63946">CLOUD</text>
  <text x="610" y="226" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="13" font-weight="400" fill="#cccccc">AWS · Vercel · Cloudflare</text>

  <!-- Bottom rule -->
  <line x1="48" y1="248" x2="852" y2="248" stroke="#333333" stroke-width="1"/>

  <!-- Bottom label -->
  <text x="72" y="264" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="9" font-weight="400" letter-spacing="2" fill="#555555">github.com/mahammadev</text>

  <!-- Top right — grid marker -->
  <text x="810" y="68" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="9" font-weight="700" letter-spacing="2" fill="#333333">2025</text>
  <line x1="800" y1="72" x2="852" y2="72" stroke="#333333" stroke-width="1"/>

</svg>
